name: Auto Update NVIDIA GPU Exporter Version

on:
  schedule:
    # Run every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Manual trigger option
    inputs:
      force_update:
        description: 'Force update even if no new version is available'
        required: false
        default: false
        type: boolean
  push:
    # Run when the workflow itself is modified
    paths:
      - '.github/workflows/update-version.yml'
  pull_request:
    # Run on PRs that modify the workflow
    paths:
      - '.github/workflows/update-version.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      update-needed: ${{ steps.version-check.outputs.update-needed }}
      current-version: ${{ steps.version-check.outputs.current-version }}
      latest-version: ${{ steps.version-check.outputs.latest-version }}
      download-url: ${{ steps.version-check.outputs.download-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new version
        id: version-check
        run: |
          # build-plg.sh is the single source of truth for the exporter version
          CURRENT_VERSION="v$(grep -oE '^EXPORTER_VERSION="[0-9.]+"' build-plg.sh | cut -d'"' -f2)"
          echo "Current version: $CURRENT_VERSION"
          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          LATEST_RELEASE=$(curl -s https://api.github.com/repos/utkuozdemir/nvidia_gpu_exporter/releases/latest)
          LATEST_VERSION=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          echo "Latest version: $LATEST_VERSION"
          echo "latest-version=$LATEST_VERSION" >> $GITHUB_OUTPUT

          DOWNLOAD_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | test("^nvidia_gpu_exporter_[0-9][0-9.]*_linux_x86_64\\.tar\\.gz$")) | .browser_download_url')
          echo "Download URL: $DOWNLOAD_URL"
          echo "download-url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ] || [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            echo "Update needed: true"
            echo "update-needed=true" >> $GITHUB_OUTPUT
          else
            echo "Update needed: false"
            echo "update-needed=false" >> $GITHUB_OUTPUT
          fi

  update-plugin:
    needs: check-version
    if: needs.check-version.outputs.update-needed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update build-plg.sh and rebuild the plg
        run: |
          set -euo pipefail
          LATEST_VERSION="${{ needs.check-version.outputs.latest-version }}"
          LATEST_NO_V="${LATEST_VERSION#v}"
          TODAY=$(date +%Y.%m.%d)

          # Fetch the release checksum for the plain linux_x86_64 tarball
          SHA=$(curl -sL "https://github.com/utkuozdemir/nvidia_gpu_exporter/releases/download/${LATEST_VERSION}/checksums.txt" \
            | awk -v f="nvidia_gpu_exporter_${LATEST_NO_V}_linux_x86_64.tar.gz" '$2==f{print $1}')
          if ! echo "$SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "ERROR: could not fetch a valid sha256 from checksums.txt (got: $SHA)"
            exit 1
          fi

          # Unraid compares plugin versions as strings, so a same-day release
          # needs a letter suffix to sort above the released one
          CUR_PLG_VER=$(grep -oE '^VERSION="[^"]+"' build-plg.sh | cut -d'"' -f2)
          if [[ "$CUR_PLG_VER" == "$TODAY"* ]]; then
            SUF="${CUR_PLG_VER:10}"
            if [ -z "$SUF" ]; then NEW_VER="${TODAY}a"; else NEW_VER="$TODAY$(echo "$SUF" | tr 'a-y' 'b-z')"; fi
          else
            NEW_VER="$TODAY"
          fi
          echo "Plugin version: $CUR_PLG_VER -> $NEW_VER, exporter -> $LATEST_VERSION"

          sed -i "s/^VERSION=.*/VERSION=\"$NEW_VER\"/" build-plg.sh
          sed -i "s/^EXPORTER_VERSION=.*/EXPORTER_VERSION=\"$LATEST_NO_V\"/" build-plg.sh
          sed -i "s/^EXPORTER_SHA256=.*/EXPORTER_SHA256=\"$SHA\"/" build-plg.sh

          NEW_CHANGES="###$NEW_VER\n- Updated to nvidia-gpu-exporter $LATEST_VERSION\n- Auto-updated via GitHub Actions"
          sed -i "/^<CHANGES>$/a\\$NEW_CHANGES" build-plg.sh

          ./build-plg.sh

      - name: Validate updated plugin
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libxml2-utils >/dev/null
          xmllint --noout nvidia_gpu_exporter.plg
          echo "XML validation passed"

          DOWNLOAD_URL="${{ needs.check-version.outputs.download-url }}"
          if curl -I -L --fail "$DOWNLOAD_URL" >/dev/null 2>&1; then
            echo "Download URL validation passed"
          else
            echo "ERROR: Download URL validation failed"
            exit 1
          fi

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="${{ needs.check-version.outputs.current-version }}"
          LATEST_VERSION="${{ needs.check-version.outputs.latest-version }}"

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          BRANCH_NAME="update-nvidia-gpu-exporter-${LATEST_VERSION}"
          git checkout -b "$BRANCH_NAME"

          git add build-plg.sh nvidia_gpu_exporter.plg
          git commit -m "chore: update nvidia-gpu-exporter from $CURRENT_VERSION to $LATEST_VERSION"

          git push origin "$BRANCH_NAME"

          PR_BODY="Updates the bundled nvidia-gpu-exporter from $CURRENT_VERSION to $LATEST_VERSION.

          Bumps the version pins in build-plg.sh (exporter version and tarball sha256) and rebuilds nvidia_gpu_exporter.plg. The download URL was checked and the plg validated with xmllint.

          Release notes: https://github.com/utkuozdemir/nvidia_gpu_exporter/releases/tag/$LATEST_VERSION"

          gh pr create \
            --title "chore: update nvidia-gpu-exporter to $LATEST_VERSION" \
            --body "$PR_BODY" \
            --head "$BRANCH_NAME" \
            --base main

      - name: Merge pull request and delete branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest-version }}
        run: |
          BRANCH_NAME="update-nvidia-gpu-exporter-${LATEST_VERSION}"
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            # Squash-merge directly and delete the branch. The repo has auto-merge
            # disabled and no required PR checks, so a direct merge is reliable.
            gh pr merge "$PR_NUMBER" --squash --delete-branch
            echo "Merged PR #$PR_NUMBER and deleted branch"
          else
            echo "ERROR: Could not find PR to merge"
            exit 1
          fi

  notify:
    needs: [check-version, update-plugin]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify workflow result
        run: |
          CURRENT_VERSION="${{ needs.check-version.outputs.current-version }}"
          LATEST_VERSION="${{ needs.check-version.outputs.latest-version }}"
          UPDATE_NEEDED="${{ needs.check-version.outputs.update-needed }}"
          if [ "$UPDATE_NEEDED" == "true" ]; then
            if [ "${{ needs.update-plugin.result }}" == "success" ]; then
              echo "Updated from $CURRENT_VERSION to $LATEST_VERSION"
            else
              echo "Failed to update from $CURRENT_VERSION to $LATEST_VERSION"
              exit 1
            fi
          else
            echo "No update needed. Current version $CURRENT_VERSION is up to date."
          fi
